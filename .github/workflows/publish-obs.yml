name: Publish to OBS

# Release convention: tag `main` with a plain version number (e.g. `0.2.0`, no leading "v")
# and push the tag.
#
# The OBS package has no server-side source service: `cargo_vendor` (needed to vendor every
# crates.io dependency for an offline RPM build) isn't available on the public api.opensuse.org
# instance's service workers, only on this repo's own OBS-Rust tooling locally. So this workflow
# does the vendoring itself and uploads the finished, ready-to-build sources (spec + source
# tarball + vendor tarball) straight to the package via the OBS source API — OBS then just
# builds what it's given, no source service involved.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}

env:
  OBS_API: https://api.opensuse.org
  OBS_PROJECT: home:rodrigosbrito:lyra
  OBS_PACKAGE: beam
  OBS_USER: rodrigosbrito

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Vendor cargo dependencies
        run: |
          mkdir -p .cargo
          cargo vendor vendor > .cargo/config.toml
          tar --zstd -cf vendor.tar.zst .cargo vendor

      - name: Build source tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git archive --format=tar --prefix="beam-${VERSION}/" "$VERSION" \
            | gzip > "beam-${VERSION}.tar.gz"

      - name: Prepare beam.spec with the release version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed "s/^Version:.*/Version:        ${VERSION}/" packaging/beam.spec > beam.spec

      - name: Upload sources to OBS
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
        run: |
          base="${OBS_API}/source/${OBS_PROJECT}/${OBS_PACKAGE}"
          comment="release ${VERSION} (${GITHUB_SHA:0:12})"

          upload() {
            local file="$1"
            local encoded_comment
            encoded_comment=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "${comment}")
            echo "Uploading ${file}..."
            http_code=$(curl --silent --show-error --output response.txt --write-out "%{http_code}" \
              -u "${OBS_USER}:${OBS_PASSWORD}" \
              -T "${file}" \
              "${base}/$(basename "${file}")?comment=${encoded_comment}")
            echo "  HTTP status: ${http_code}"
            if [ "${http_code}" -ge 300 ]; then
              echo "  Response body:"
              cat response.txt
              exit 1
            fi
          }

          upload beam.spec
          upload "beam-${VERSION}.tar.gz"
          upload vendor.tar.zst
