<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4c8bf5"/>
      <stop offset="1" stop-color="#2456c9"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>

  <!-- remote screen -->
  <rect x="30" y="38" width="68" height="46" rx="6" fill="#0c1a3d" opacity="0.9"/>
  <rect x="36" y="44" width="56" height="34" rx="3" fill="#eaf1ff"/>

  <!-- signal beam -->
  <path d="M 40 96 L 64 30 L 88 96" fill="none" stroke="url(#beam)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="64" cy="30" r="6" fill="#ffffff"/>

  <!-- stand -->
  <rect x="58" y="84" width="12" height="10" fill="#0c1a3d" opacity="0.9"/>
  <rect x="48" y="94" width="32" height="6" rx="3" fill="#0c1a3d" opacity="0.9"/>
</svg>
